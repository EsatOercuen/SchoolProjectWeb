<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unser Team - VIP Shishazimmer Vermietung</title>
  <link rel="stylesheet" href="css/style.css">

  <link rel="icon" type="image/png" href="img/symbol.png">
  <link rel="icon" type="image/png" href="img/symbol.png">
  <link rel="icon" type="image/png" href="img/symbol.png">
  <link rel="apple-touch-icon" type="image/png" href="img/symbol.png">

  <style>
    /* Allgemeines Styling */
    body {
      font-family: 'Arial', sans-serif;
      color: white;
      background-color: #111;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      color: #fff;
      font-size: 2rem;
      margin-top: 40px;
    }

    h2 {
      font-size: 1.2rem;
      color: #FFC107; /* Gelbe Farbe für den Namen */
    }

    p {
      color: #ddd;
    }

    /* Team Section */
    .mitarbeiter {
      display: flex;
      flex-direction: column; /* Vertikale Anordnung */
      align-items: center;
      padding: 60px 20px;
    }

    .mitarbeiter-card {
      background-color: #333;
      border: 2px solid #FFC107; /* Gelber Rand */
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      width: 250px;
      margin: 20px;
      transition: transform 0.3s ease;
    }

    .mitarbeiter-card:hover {
      transform: scale(1.05);
    }

    .mitarbeiter-card img {
      border-radius: 50%;
      width: 150px;
      height: 150px;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid #FFC107; /* Gelber Rand um das Bild */
    }

    /* Paarige Mitarbeiteranordnung für Lennart und Mirkan */
    .mitarbeiter-pair {
      display: flex;
      justify-content: center;
      gap: 40px; /* Abstand zwischen den Karten */
      width: 100%;
    }

    /* Link zurück zur Startseite */
    .back-to-home {
      margin-top: 40px;
      font-size: 1.2rem;
    }

    .back-to-home a {
      text-decoration: none;
      color: #FFC107;
      font-weight: bold;
    }

    .back-to-home a:hover {
      text-decoration: underline;
    }

    footer {
      padding: 20px;
      background-color: #222;
      color: #ccc;
      margin-top: 40px;
    }

    /* Stil für die E-Mail im Footer (Gold und anklickbar) */
    footer a {
      color: #f4b41a;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Media Queries für ein flexibles Layout */
    @media (max-width: 768px) {
      /* Reduziere die Abstände und passe die Kartenbreite an */
      .mitarbeiter {
        padding: 20px;
      }

      .mitarbeiter-card {
        width: 90%; /* Die Karten füllen den Bildschirm breiter aus */
      }

      .mitarbeiter-pair {
        flex-direction: column; /* Anordnung der Karten untereinander auf kleinen Bildschirmen */
        gap: 20px; /* Weniger Abstand zwischen den Karten */
      }

      h1 {
        font-size: 1.5rem; /* Schriftgröße des Titels anpassen */
      }

      h2 {
        font-size: 1rem; /* Schriftgröße der Namen anpassen */
      }

      .back-to-home {
        margin-top: 20px;
      }

      footer {
        font-size: 0.9rem; /* Schriftgröße im Footer anpassen */
      }
    }

    @media (max-width: 480px) {
      /* Für sehr kleine Bildschirme (Smartphones) */
      .mitarbeiter-card img {
        width: 100px; /* Bildgröße verkleinern */
        height: 100px;
      }

      h1 {
        font-size: 1.2rem; /* Titel weiter verkleinern */
      }

      h2 {
        font-size: 0.9rem; /* Namen verkleinern */
      }

      .mitarbeiter-card {
        padding: 15px; /* Weniger Padding in den Karten */
      }

      footer {
        font-size: 0.8rem; /* Footer weiter verkleinern */
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Unser Team</h1>
  </header>

  <main>
    <section class="mitarbeiter">
      <!-- Yusuf Abi oben -->
      <div class="mitarbeiter-card">
        <img src="img/yusuf_abi.jpg" alt="Yusuf Abi">
        <h2>Yusuf Abi</h2>
        <p>CEO & Inhaber</p>
      </div>

      <!-- Esat Örcün darunter -->
      <div class="mitarbeiter-card">
        <img src="img/esat_orcun.jpg" alt="Esat Örcün">
        <h2>Esat Örcün</h2>
        <p>Shisha-Experte</p>
      </div>

      <!-- Erfan Kahbalci direkt unter Esat Örcün -->
      <div class="mitarbeiter-card">
        <img src="img/erfan_kahbalci.jpg" alt="Erfan Kahbalci">
        <h2>Erfan Kahbalci</h2>
        <p>DJ & Musik Produzent</p>
      </div>

      <!-- Lennart und Mirkan Dengler nebeneinander -->
      <div class="mitarbeiter-pair">
        <div class="mitarbeiter-card">
          <img src="img/lennart_dengler.jpg" alt="Lennart Dengler">
          <h2>Lennart Dengler</h2>
          <p>Security</p>
        </div>

        <div class="mitarbeiter-card">
          <img src="img/mirkan_dengler.jpg" alt="Mirkan Dengler">
          <h2>Mirkan Dengler</h2>
          <p>Security</p>
        </div>
      </div>
    </section>

    <!-- Link zurück zur Startseite -->
    <div class="back-to-home">
      <a href="index.html">Zur Startseite</a>
    </div>
  </main>

<footer>
  <p>
    Kontakt: <a href="mailto:info@shishazimmer.de">info@shishazimmer.de</a> |
    <a href="Impressum.html">Impressum</a> |
    © 2024 VIP Shishazimmer
  </p>
</footer>

</body>

</html>
